<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform Media Player</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        body {
            margin: 0;
            padding: 24px;
            background-color: #0b0f19;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .player-wrapper {
            width: 100%;
            max-width: 960px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
            background: #131a26;
            padding: 8px;
        }
        :root {
            --plyr-color-main: #2563eb;
            --plyr-video-background: #131a26;
            --plyr-menu-background: #1e293b;
            --plyr-menu-color: #f8fafc;
        }
    </style>
</head>
<body>

    <div class="player-wrapper">
        <div id="media-player" data-plyr-provider="youtube" data-plyr-embed-id="BrDHsQyhQQE"></div>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const instance = new Plyr("#media-player", {
                controls: [
                    "play-large",
                    "play",
                    "progress",
                    "current-time",
                    "duration",
                    "mute",
                    "volume",
                    "settings",
                    "pip",
                    "fullscreen"
                ],
                youtube: {
                    nocookie: true,
                    rel: 0,
                    showinfo: 0,
                    iv_load_policy: 3,
                    modestbranding: 1
                },
                i18n: {
                    restart: "إعادة التشغيل",
                    play: "تشغيل",
                    pause: "إيقاف مؤقت",
                    seek: "تقديم/تأخير",
                    played: "تم تشغيله",
                    buffered: "تم تحميله",
                    currentTime: "الوقت الحالي",
                    duration: "المدة الإجمالية",
                    volume: "مستوى الصوت",
                    mute: "كتم الصوت",
                    unmute: "إلغاء الكتم",
                    enableCaptions: "تفعيل الترجمة",
                    disableCaptions: "إيقاف الترجمة",
                    enterFullscreen: "ملء الشاشة",
                    exitFullscreen: "إلغاء ملء الشاشة",
                    settings: "الإعدادات",
                    speed: "السرعة",
                    normal: "طبيعي",
                    quality: "الجودة",
                    loop: "تكرار"
                }
            });

            window.playerInstance = instance;
        });
    </script>
</body>
</html>
